  <!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Music List</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style/base.css">
    <link rel="stylesheet" href="../style/components.css">
    <style>
      .add-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
      .add-row input {
        flex: 1; min-width: 160px; background: var(--tan-light);
        border: 1.5px solid var(--tan); border-radius: var(--radius-pill);
        padding: 7px 14px; font-family: var(--font-body);
        font-size: 0.82rem; color: var(--brown); outline: none;
      }
      .add-row input:focus { border-color: var(--accent); }
      .add-row input.error { border-color: #c0392b; }
      .error-msg { font-size: 0.75rem; color: #c0392b; margin-bottom: 10px; display: none; }
      .error-msg.show { display: block; }
  
      .song-list { display: flex; flex-direction: column; gap: 12px; }
  
      .song-card {
        background: var(--warm-white);
        border: 1.5px solid var(--tan);
        border-radius: var(--radius-lg);
        overflow: hidden;
        animation: fadeUp 0.2s ease;
      }
  
      .song-card-header {
        display: flex; align-items: center; gap: 10px;
        padding: 10px 14px;
      }
  
      .song-num {
        font-family: var(--font-display); font-size: 0.7rem;
        font-weight: 700; color: var(--muted); width: 20px; flex-shrink: 0;
      }
  
      .song-info { flex: 1; }
      .song-title { font-family: var(--font-display); font-size: 0.9rem; font-weight: 700; color: var(--brown); }
      .song-meta { font-size: 0.72rem; color: var(--muted); }
  
      .toggle-embed {
        background: var(--tan-light); border: 1.5px solid var(--tan);
        border-radius: var(--radius-pill); padding: 4px 12px;
        font-family: var(--font-display); font-size: 0.7rem; font-weight: 700;
        color: var(--brown-mid); cursor: pointer; transition: background 0.15s;
        flex-shrink: 0;
      }
      .toggle-embed:hover { background: var(--tan); }
  
      .del {
        background: none; border: none; color: var(--muted);
        cursor: pointer; font-size: 0.85rem; opacity: 0;
        transition: opacity 0.15s; flex-shrink: 0;
      }
      .song-card:hover .del { opacity: 1; }
      .del:hover { color: #c0392b; }
  
      .embed-wrap {
        padding: 0 14px 12px;
        display: none;
      }
      .embed-wrap.open { display: block; }
      .embed-wrap iframe {
        width: 100%; height: 80px; border: none;
        border-radius: var(--radius-md);
      }
  
      .empty-state {
        text-align: center; color: var(--muted);
        font-size: 0.82rem; padding: 32px; font-style: italic;
      }
    </style>
  </head>
  <body>
  <div class="page fade-up">
    <a class="back-nav" href="../index.html">← back</a>
    <div class="page-header">
      <div>
        <h1>🎵 Music List</h1>
        <div class="subtitle">your personal soundtrack</div>
      </div>
    </div>
  
    <div class="card">
      <div class="add-row">
        <input type="text" id="title-input" placeholder="song title..." onkeydown="if(event.key==='Enter') addSong()">
        <input type="text" id="artist-input" placeholder="artist..." onkeydown="if(event.key==='Enter') addSong()">
        <input type="text" id="link-input" placeholder="paste spotify link..." onkeydown="if(event.key==='Enter') addSong()">
        <button class="btn" onclick="addSong()">+ add</button>
      </div>
      <div class="error-msg" id="error-msg">invalid spotify link — paste a track URL like open.spotify.com/track/...</div>
  
      <div class="song-list" id="song-list">
        <div class="empty-state">loading... ☕</div>
      </div>
    </div>
  </div>
  
  <script>
    const API = 'http://127.0.0.1:8000/api/v1/planner';
  
    function extractTrackId(url) {
      try {
        const match = url.match(/spotify\.com\/track\/([a-zA-Z0-9]+)/);
        return match ? match[1] : null;
      } catch { return null; }
    }
  
    async function loadSongs() {
      const res = await fetch(`${API}/music`);
      const songs = await res.json();
      render(songs);
    }
  
    function render(songs) {
      const list = document.getElementById('song-list');
      list.innerHTML = '';
      if (!songs.length) {
        list.innerHTML = '<div class="empty-state">no songs yet — paste a spotify link above ☕</div>';
        return;
      }
      songs.forEach((s, i) => {
        const trackId = extractTrackId(s.genre); // we store the spotify URL in the genre field
        const card = document.createElement('div');
        card.className = 'song-card';
        card.innerHTML = `
          <div class="song-card-header">
            <span class="song-num">${i + 1}</span>
            <div class="song-info">
              <div class="song-title">${s.title}</div>
              <div class="song-meta">${s.artist || ''}</div>
            </div>
            ${trackId ? `<button class="toggle-embed" onclick="toggleEmbed(this)">▶ play</button>` : ''}
            <button class="del" onclick="deleteSong(${s.id})">✕</button>
          </div>
          ${trackId ? `
          <div class="embed-wrap">
            <iframe src="https://open.spotify.com/embed/track/${trackId}"
              allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
              loading="lazy">
            </iframe>
          </div>` : ''}
        `;
        list.appendChild(card);
      });
    }
  
    function toggleEmbed(btn) {
      const wrap = btn.closest('.song-card').querySelector('.embed-wrap');
      const open = wrap.classList.toggle('open');
      btn.textContent = open ? '▼ hide' : '▶ play';
    }
  
    async function addSong() {
      const title = document.getElementById('title-input').value.trim();
      const artist = document.getElementById('artist-input').value.trim();
      const link = document.getElementById('link-input').value.trim();
      const errMsg = document.getElementById('error-msg');
      const linkInput = document.getElementById('link-input');
  
      if (!title) return;
  
      // validate link if provided
      if (link && !extractTrackId(link)) {
        linkInput.classList.add('error');
        errMsg.classList.add('show');
        return;
      }
      linkInput.classList.remove('error');
      errMsg.classList.remove('show');
  
      // store spotify URL in the genre field (reusing existing schema)
      await fetch(`${API}/music`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, artist, genre: link })
      });
  
      document.getElementById('title-input').value = '';
      document.getElementById('artist-input').value = '';
      document.getElementById('link-input').value = '';
      loadSongs();
    }
  
    async function deleteSong(id) {
      await fetch(`${API}/music/${id}`, { method: 'DELETE' });
      loadSongs();
    }
  
    loadSongs();
  </script>
  </body>
  </html>
